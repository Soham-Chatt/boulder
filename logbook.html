<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook</title>
  <!--Bootstrap files -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  <!-- My files -->
  <script src="logbook.js" defer></script>
</head>
<body class="bg-dark text-white">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Boulder Halls</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" aria-current="page" href="./index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="./logbook.html">Logbook</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<div class="container py-5">
  <h2 class="mb-4">Logbook</h2>

  <!-- Search -->
  <div class="col-md">
    <div class="input-group mb-3">
      <!-- Search Input -->
      <span class="input-group-text" id="basic-addon1"><i class="bi bi-search"></i></span>
      <input type="text" id="searchLogInput" class="form-control" aria-label="search" aria-describedby="basic-addon1" oninput="filterLogEntries()">
    </div>
  </div>

  <!-- Logbook Table -->
  <div class="table-responsive">
    <table class="table table-dark table-striped">
      <thead>
      <tr>
        <th><button class="btn btn-secondary" onclick="sortByName()">Name</button></th>
        <th><button class="btn btn-secondary" onclick="sortByGrade()">Max Grade</button></th>
        <th><button class="btn btn-secondary" onclick="sortByDate()">Date</button></th>
      </tr>
      </thead>
      <tbody id="logbookEntries">
      <!-- Logbook entries here -->
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
