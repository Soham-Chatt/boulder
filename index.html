<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulder Halls</title>
    <!--Bootstrap files -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- My files -->
    <script src="script.js" defer></script>
</head>

<body class="bg-dark text-white">
<div class="container py-5">
    <h1 class="text-center mb-4">Boulder Halls</h1>

    <div class="row justify-content-center">
        <!-- Warning -->
        <div class="col-md-7">
            <div id="warning" class="alert alert-danger text-center" role="alert" style="display:none"></div>
        </div>

        <div class="col-md-8">
            <div id="map" class="mb-3" ></div>
            <!-- Search bar -->
            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1"><i class="bi bi-search"></i></span>
                <input type="text" id="searchInput" class="form-control" placeholder="Search..." aria-label="search" aria-describedby="basic-addon1" oninput="filterHalls()">
                <!-- Visited Halls Counter -->
                <button id="visitedCounter" class="btn btn-success" onclick="showVisited()">0 Visited</button>
            </div>

            <!-- List of halls -->
            <div class="table-responsive">
                <table id="hallTable" class="table table-striped border">
                    <thead>
                    <tr>
                        <th><button class="btn btn-secondary" onclick="sortByName()">Name</button></th>
                        <th><button class="btn btn-secondary" onclick="sortByCity()">City</button></th>
                        <th><button class="btn btn-secondary" onclick="sortByProvince()">Province</button></th>
                        <th><button class="btn btn-secondary" onclick="sortByDistance()">Distance</button></th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Table rows here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>

</html>
